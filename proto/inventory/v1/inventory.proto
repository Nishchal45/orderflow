syntax = "proto3";

package inventory.v1;

option go_package = "github.com/Nishchal45/orderflow/gen/inventory/v1;inventoryv1";

import "google/protobuf/timestamp.proto";

service InventoryService {
  rpc ReserveInventory(ReserveInventoryRequest) returns (ReserveInventoryResponse);
  rpc ReleaseInventory(ReleaseInventoryRequest) returns (ReleaseInventoryResponse);
  rpc GetStock(GetStockRequest) returns (GetStockResponse);
}

// Enums

enum ReservationStatus {
  RESERVATION_STATUS_UNSPECIFIED = 0;
  RESERVATION_STATUS_RESERVED = 1;
  RESERVATION_STATUS_RELEASED = 2;
  RESERVATION_STATUS_CONFIRMED = 3;
}

// Messages

message Product {
  string id = 1;
  string name = 2;
  int32 stock = 3;
  int32 reserved = 4;
  int32 available = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message Reservation {
  string id = 1;
  string order_id = 2;
  string product_id = 3;
  int32 quantity = 4;
  ReservationStatus status = 5;
  google.protobuf.Timestamp created_at = 6;
}

// Request/Response

message ReserveInventoryRequest {
  string order_id = 1;
  repeated ReserveItem items = 2;
  bool simulate_failure = 3;
}

message ReserveItem {
  string product_id = 1;
  int32 quantity = 2;
}

message ReserveInventoryResponse {
  bool success = 1;
  string message = 2;
  repeated Reservation reservations = 3;
}

message ReleaseInventoryRequest {
  string order_id = 1;
}

message ReleaseInventoryResponse {
  bool success = 1;
  string message = 2;
}

message GetStockRequest {
  string product_id = 1;
}

message GetStockResponse {
  Product product = 1;
}
