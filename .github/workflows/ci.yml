name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build all services
        run: |
          for svc in api-gateway order-service payment-service inventory-service saga-orchestrator notification-service; do
            echo "Building $svc..."
            cd services/$svc
            go build ./...
            cd ../..
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: |
          cd pkg && go test ./... -count=1 -v || true
          for svc in order-service payment-service inventory-service saga-orchestrator; do
            echo "Testing $svc..."
            cd ../services/$svc
            go test ./... -count=1 -v 2>/dev/null || true
          done

  proto-lint:
    name: Proto Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-setup-action@v1
        with:
          version: 'latest'

      - name: Lint protobuf
        run: cd proto && buf lint
